<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none" role="img" aria-label="Подразделение БПЛА">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101a2e"/>
      <stop offset="1" stop-color="#1b2740"/>
    </linearGradient>
    <radialGradient id="beam" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="600" height="420" rx="18" fill="url(#sky)"/>

  <!-- perspective grid floor -->
  <g stroke="#f59e0b" stroke-opacity="0.10" stroke-width="1">
    <path d="M0 330 H600"/>
    <path d="M300 300 L-40 420 M300 300 L180 420 M300 300 L420 420 M300 300 L640 420"/>
    <path d="M120 300 H480 M60 340 H540 M10 380 H590"/>
  </g>

  <!-- horizon glow -->
  <path d="M0 300 H600" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="470" cy="96" r="60" fill="#f59e0b" fill-opacity="0.06"/>
  <circle cx="470" cy="96" r="34" fill="#f59e0b" fill-opacity="0.08"/>

  <!-- drone beam -->
  <path d="M300 150 L300 300 L360 300 Z" fill="url(#beam)"/>

  <!-- drone (quadcopter) -->
  <g transform="translate(300 150)">
    <g stroke="url(#drone)" stroke-width="3">
      <path d="M-78 -28 H-30 M30 -28 H78"/>
      <circle cx="-78" cy="-28" r="13" fill="#0b0f19"/>
      <circle cx="78" cy="-28" r="13" fill="#0b0f19"/>
      <circle cx="-54" cy="-44" r="11" fill="#0b0f19"/>
      <circle cx="54" cy="-44" r="11" fill="#0b0f19"/>
    </g>
    <rect x="-26" y="-16" width="52" height="26" rx="8" fill="#0b0f19" stroke="url(#drone)" stroke-width="2.5"/>
    <circle cx="0" cy="-3" r="5" fill="url(#drone)"/>
    <rect x="-7" y="12" width="14" height="22" rx="4" fill="#0b0f19" stroke="url(#drone)" stroke-width="2"/>
  </g>

  <!-- target marker on ground -->
  <g transform="translate(330 300)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M0 -8 V8 M-8 0 H8" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- operator silhouette -->
  <g transform="translate(180 300)" fill="#0b0f19" stroke="#f59e0b" stroke-width="1.6" stroke-opacity="0.65">
    <circle cx="0" cy="-44" r="24"/>
    <path d="M-38 -8 q38 -30 76 0 l8 66 q-46 18 -92 0 Z"/>
    <rect x="-86" y="-22" width="58" height="14" rx="7" transform="rotate(-14 -57 -15)"/>
  </g>
</svg>
